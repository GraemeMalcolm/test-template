<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>
    <div class="content-page">
        <h1><a href="{{ '/' | relative_url }}">{{ site.module_title }}</a></h1>
        <h2>{{ page.title }}</h2>

        <div class="scrollable-content">
            {{ content }}
        </div>

        <div class="navigation-bar">
            {% if page.previous_page %}
            <a href="{{ page.previous_page | relative_url }}" class="nav-button prev-button">← Previous</a>
            {% else %}
            <span class="nav-button prev-button disabled">← Previous</span>
            {% endif %}

            {% if page.next_page %}
            <a href="{{ page.next_page | relative_url }}" class="nav-button next-button">Next →</a>
            {% else %}
            <span class="nav-button next-button disabled">Next →</span>
            {% endif %}
        </div>
    </div>
    <script src="{{ '/assets/js/navigation.js' | relative_url }}"></script>
</body>

</html>
